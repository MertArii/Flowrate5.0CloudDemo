# Prod kurgusu — Mac mini M4 Pro / 48 GB unified memory.
#
# Ollama BU DOSYADA YOK: host'ta native çalışır (Metal GPU erişimi için).
# Container'lar ona host.docker.internal:11434 üzerinden ulaşır.
#
# Çalıştırma:
#   cp .env.prod.example .env.prod   (ve doldur)
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Bellek bütçesi (48 GB):
#   Ollama (9b + 27b Q4 + context) ~30 GB  | container'lar ~13 GB | macOS ~5 GB
#   Container limitleri aşağıda sabitlendi ki Ollama'nın belleğini yemesinler.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-api-build: &api-build
  build:
    context: ./app
  image: helpdesk-api:latest
  env_file: .env.prod
  environment:
    OLLAMA_BASE_URL: http://host.docker.internal:11434
    DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    REDIS_URL: redis://redis:6379/0
  # api yüklenen dosyayı yazar, worker aynı dizinden okur — paylaşımlı olmalı.
  volumes:
    - uploads:/code/data/uploads
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  logging: *default-logging

services:
  # Tek giriş noktası. Dışarıya sadece bu açık; api/webui doğrudan erişilemez.
  caddy:
    image: caddy:2.8-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - open-webui
    restart: unless-stopped
    mem_limit: 256m
    logging: *default-logging

  api:
    <<: *api-build
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    expose:
      - "8000"
    mem_limit: 2g
    cpus: 2.0
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request;urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Asenkron işler: büyük PDF ingest, embedding üretimi, SharePoint senkronu.
  # Ağır işleri api'den ayırır ki kullanıcı istekleri bloke olmasın.
  worker:
    <<: *api-build
    command: arq app.worker.WorkerSettings
    mem_limit: 3g
    cpus: 2.0

  redis:
    image: redis:7.4-alpine
    command: redis-server --save 60 1 --loglevel warning --maxmemory 768mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    mem_limit: 1g
    logging: *default-logging

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Prod'da host'a port AÇMIYORUZ; sadece iç ağdan erişilir.
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./db/tickets.sql:/docker-entrypoint-initdb.d/02_tickets.sql:ro
    command: >
      postgres -c shared_buffers=1GB -c effective_cache_size=3GB
               -c maintenance_work_mem=512MB -c max_connections=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    mem_limit: 4g
    cpus: 2.0
    logging: *default-logging

  # SÜRÜMÜ SABİTLE: ':main' hareketli etikettir, bir gün beklenmedik şekilde
  # değişir. Kurulumdan önce güncel kararlı sürümü kontrol edip buraya yazın.
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    env_file: .env.prod
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      WEBUI_URL: ${PUBLIC_URL}
      # Entra ID (Microsoft 365) SSO
      ENABLE_OAUTH_SIGNUP: "true"
      OAUTH_CLIENT_ID: ${ENTRA_CLIENT_ID}
      OAUTH_CLIENT_SECRET: ${ENTRA_CLIENT_SECRET}
      OPENID_PROVIDER_URL: https://login.microsoftonline.com/${ENTRA_TENANT_ID}/v2.0/.well-known/openid-configuration
      OAUTH_PROVIDER_NAME: Microsoft
      OAUTH_SCOPES: "openid email profile"
      # Kayıt olmayı sadece kurumsal hesaplara bırak
      ENABLE_SIGNUP: "false"
    volumes:
      - webui:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8080"
    restart: unless-stopped
    mem_limit: 2g
    logging: *default-logging

  # Günlük yedek. DIŞARI KOPYALAMAYI AYRICA KURUN (NAS/başka makine) —
  # aynı diskteki yedek, disk arızasında işe yaramaz.
  backup:
    image: prodrigestivill/postgres-backup-local:16
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: "14"
      BACKUP_KEEP_WEEKS: "8"
      BACKUP_KEEP_MONTHS: "6"
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 512m
    logging: *default-logging

volumes:
  pgdata:
  redisdata:
  webui:
  uploads:
  caddy_data:
  caddy_config:
